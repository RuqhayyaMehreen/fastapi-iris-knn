<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #574fd6;
        }

        textarea {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 16px;
        }

        .result-title {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌸 Iris Flower Prediction</h2>

    <label>Sepal Length</label>
    <input type="number" id="sepal_length" step="any" placeholder="Enter sepal length">

    <label>Sepal Width</label>
    <input type="number" id="sepal_width" step="any" placeholder="Enter sepal width">

    <label>Petal Length</label>
    <input type="number" id="petal_length" step="any" placeholder="Enter petal length">

    <label>Petal Width</label>
    <input type="number" id="petal_width" step="any" placeholder="Enter petal width">

    <button onclick="predictFlower()">Predict</button>

    <div class="result-title">Prediction Result:</div>
    <textarea id="result" rows="3" readonly></textarea>
</div>

<script>
    async function predictFlower() {
        const data = {
            sepal_length: parseFloat(document.getElementById("sepal_length").value),
            sepal_width: parseFloat(document.getElementById("sepal_width").value),
            petal_length: parseFloat(document.getElementById("petal_length").value),
            petal_width: parseFloat(document.getElementById("petal_width").value)
        };

        const response = await fetch("/flower", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").value = result.prediction;
    }
</script>

</body>
</html>
